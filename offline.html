<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لا يوجد اتصال | Forms</title>
  <meta name="theme-color" content="#6366F1">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8FAFC;
      --text: #1E293B;
      --text-sec: #64748B;
      --primary: #6366F1;
      --card: #FFFFFF;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F172A;
        --text: #F8FAFC;
        --text-sec: #94A3B8;
        --card: #1E293B;
      }
    }
    body {
      margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center;
    }
    .container {
      background: var(--card); padding: 40px; border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      max-width: 400px; width: 90%;
    }
    .icon { font-size: 64px; margin-bottom: 20px; animation: bounce 2s infinite ease-in-out; display: inline-block; }
    h1 { margin: 0 0 10px; font-size: 1.5rem; font-weight: 800; }
    p { margin: 0 0 30px; color: var(--text-sec); font-size: 1rem; line-height: 1.6; }
    .btn {
      background: var(--primary); color: white; border: none;
      padding: 12px 24px; border-radius: 10px; font-size: 1rem;
      font-weight: 600; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s; text-decoration: none; display: inline-block;
    }
    .btn:hover { opacity: 0.9; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>يبدو أنك فقدت الاتصال بشبكة الإنترنت. يرجى التحقق من اتصالك والمحاولة مرة أخرى لتتمكن من استخدام المنصة.</p>
    <button class="btn" onclick="window.location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
